name: Keep Render Server Alive

on:
  schedule:
    - cron: '*/13 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://appbackend-1-4i4x.onrender.com/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: server returned $STATUS"
          fi
