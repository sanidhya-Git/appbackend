services:
  - type: web
    name: event-photo-finder-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build && npx prisma generate
    startCommand: node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: FACE_SERVICE_URL
        value: http://localhost:8000
      - key: ENCRYPTION_KEY
        sync: false
      - key: REDIS_URL
        value: redis://localhost:6379
      - key: RENDER_EXTERNAL_URL
        value: https://appbackend-1-4i4x.onrender.com
      - key: APP_NAME
        value: EventPhotoFinder
